# fly.io config — rename app via: fly apps create enzine-bot-ВАШ_НИК
app = "enzine-bot"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile.bot"

[env]
  BOT_WEBHOOK_PATH = "/webhook"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"
